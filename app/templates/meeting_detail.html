<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — AREC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/crm.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8f9fa; --bg-card: #ffffff; --bg-muted: #f1f5f9;
      --text: #1e293b; --text-sec: #475569; --text-muted: #94a3b8;
      --accent: #D97757; --accent-hover: #c4684a; --border: #e5e7eb; --radius: 10px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .page-wrap { max-width: 860px; margin: 0 auto; padding: 24px 28px 60px; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted); text-decoration: none;
      margin-bottom: 20px;
    }
    .back-link:hover { color: var(--accent); }

    .meeting-header {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 24px; margin-bottom: 20px;
      display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;
    }
    .meeting-header h1 { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.4; }
    .meeting-meta { margin-top: 8px; font-size: 13px; color: var(--text-sec); display: flex; flex-wrap: wrap; gap: 12px; }
    .meta-item { display: flex; align-items: center; gap: 5px; }
    .meta-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }

    .header-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn {
      display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px;
      border-radius: 6px; font-size: 12px; font-weight: 600; font-family: inherit;
      cursor: pointer; text-decoration: none; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text); transition: all 0.12s;
    }
    .btn:hover { background: var(--bg-muted); border-color: var(--text-muted); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    /* ===== VIEW MODE ===== */
    .content-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; line-height: 1.7;
    }
    #view-mode h1, #view-mode h2, #view-mode h3 {
      font-size: 13px; font-weight: 700; color: var(--text-sec);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin: 20px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
    }
    #view-mode h1:first-child, #view-mode h2:first-child { margin-top: 0; }
    #view-mode p { font-size: 14px; color: var(--text); margin-bottom: 10px; }
    #view-mode ul { padding-left: 20px; margin-bottom: 10px; }
    #view-mode li { font-size: 14px; color: var(--text); margin-bottom: 4px; }
    #view-mode li.checked { color: var(--text-muted); text-decoration: line-through; }
    #view-mode strong { font-weight: 600; }
    #view-mode em { font-style: italic; color: var(--text-sec); }
    #view-mode hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    #view-mode .meta-line { display: none; } /* Hide raw **Date:**/**Source:** lines */

    /* ===== EDIT MODE ===== */
    #edit-mode { display: none; }
    #edit-textarea {
      width: 100%; min-height: 520px; padding: 20px; border: 1px solid var(--border);
      border-radius: var(--radius); font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px; line-height: 1.6; background: var(--bg-card); color: var(--text);
      resize: vertical; outline: none;
    }
    #edit-textarea:focus { border-color: var(--accent); }

    .save-status { font-size: 12px; color: var(--text-muted); margin-left: 8px; }
    .save-status.ok { color: #22c55e; }
    .save-status.err { color: #ef4444; }
  </style>
</head>
<body>

{% set active_tab = 'dashboard' %}
{% include '_nav.html' %}

<div class="page-wrap">
  <a href="/" class="back-link">← Dashboard</a>

  <div class="meeting-header">
    <div>
      <h1>{{ title }}</h1>
      <div class="meeting-meta">
        {% if meeting_date %}<span class="meta-item"><span class="meta-label">Date</span> {{ meeting_date }}</span>{% endif %}
        {% if attendees %}<span class="meta-item"><span class="meta-label">Attendees</span> {{ attendees }}</span>{% endif %}
        {% if source_url %}<span class="meta-item"><a href="{{ source_url }}" target="_blank" rel="noopener" style="color:var(--accent);font-size:13px;text-decoration:none;">{{ source_label or 'Source' }} ↗</a></span>{% endif %}
      </div>
    </div>
    <div class="header-actions">
      <button id="edit-btn" class="btn" onclick="toggleEdit()">✎ Edit</button>
      <button id="save-btn" class="btn btn-primary" onclick="saveContent()" style="display:none;">Save</button>
      <button id="cancel-btn" class="btn" onclick="cancelEdit()" style="display:none;">Cancel</button>
      <span class="save-status" id="save-status"></span>
    </div>
  </div>

  <!-- VIEW MODE -->
  <div class="content-card" id="view-mode">
    {{ rendered_html | safe }}
  </div>

  <!-- EDIT MODE -->
  <div id="edit-mode">
    <textarea id="edit-textarea">{{ raw_content }}</textarea>
  </div>
</div>

<script>
const FILENAME = {{ filename | tojson }};
let originalContent = document.getElementById('edit-textarea').value;

function toggleEdit() {
  document.getElementById('view-mode').style.display = 'none';
  document.getElementById('edit-mode').style.display = 'block';
  document.getElementById('edit-btn').style.display = 'none';
  document.getElementById('save-btn').style.display = 'inline-flex';
  document.getElementById('cancel-btn').style.display = 'inline-flex';
  document.getElementById('edit-textarea').focus();
}

function cancelEdit() {
  document.getElementById('edit-textarea').value = originalContent;
  document.getElementById('view-mode').style.display = 'block';
  document.getElementById('edit-mode').style.display = 'none';
  document.getElementById('edit-btn').style.display = 'inline-flex';
  document.getElementById('save-btn').style.display = 'none';
  document.getElementById('cancel-btn').style.display = 'none';
  document.getElementById('save-status').textContent = '';
}

async function saveContent() {
  const content = document.getElementById('edit-textarea').value;
  const status = document.getElementById('save-status');
  status.className = 'save-status';
  status.textContent = 'Saving…';

  try {
    const resp = await fetch(`/meetings/${FILENAME}/save`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    if (!resp.ok) throw new Error('Save failed');

    originalContent = content;
    status.className = 'save-status ok';
    status.textContent = 'Saved ✓';

    // Reload page to show updated rendered content
    setTimeout(() => location.reload(), 600);
  } catch (err) {
    status.className = 'save-status err';
    status.textContent = err.message;
  }
}
</script>
</body>
</html>
