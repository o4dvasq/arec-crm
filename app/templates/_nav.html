<!-- Row 1: Brand Bar -->
<header class="brand-bar">
    <div class="brand-bar-inner">
        <div class="brand-left">
            <i data-lucide="target" class="brand-icon"></i>
            <span class="brand-text">AREC CRM</span>
        </div>
        {% if g.user %}
        <div class="user-menu">
            <span class="user-menu-name">{{ g.user.display_name or g.user.email }}</span>
            <div class="user-dropdown">
                {% if g.user.role == 'admin' %}
                <a href="/admin/users" class="user-dropdown-item user-dropdown-admin">Admin</a>
                {% endif %}
                <a href="/.auth/logout" class="user-dropdown-item">Logout</a>
            </div>
        </div>
        {% endif %}
    </div>
</header>

<!-- Row 2: Nav Tabs -->
<nav class="nav-tabs">
    <div class="nav-tabs-inner">
        <div class="nav-tabs-spacer"></div>
        <div class="nav-tabs-center">
            <a href="/crm" class="nav-tab {% if active_tab == 'pipeline' %}nav-tab--active{% endif %}">Pipeline</a>
            <a href="/crm/people" class="nav-tab {% if active_tab == 'people' %}nav-tab--active{% endif %}">People</a>
            <a href="/crm/orgs" class="nav-tab {% if active_tab == 'orgs' %}nav-tab--active{% endif %}">Orgs</a>
            <a href="/crm/tasks" class="nav-tab {% if active_tab == 'tasks' %}nav-tab--active{% endif %}">Tasks</a>
        </div>

        <div class="nav-tabs-spacer"></div>
    </div>
</nav>

<!-- Lucide Icons CDN -->
<script src="https://unpkg.com/lucide@latest"></script>
<!-- Global Icon Registry -->
<script src="/static/icons.js"></script>
<!-- Search index data -->
<script>window.SEARCH_INDEX = {{ search_index_json | default('[]') | safe }};</script>
<!-- Global CRM JS -->
<script src="/static/crm.js"></script>
