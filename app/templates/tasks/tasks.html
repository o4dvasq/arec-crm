<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tasks — AREC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/crm.css">
  <link rel="stylesheet" href="/static/tasks/tasks.css">
  <link rel="stylesheet" href="/static/task-edit-modal.css">
</head>
<body>

{% set active_tab = 'tasks' %}
{% include '_nav.html' %}

<div id="board"></div>
<div id="toast" class="toast hidden"></div>

<script>
const CONFIG = {{ config | tojson }};
window.TASK_MODAL_TEAM = CONFIG.team.map(m => m.name) || [];
window.TASK_MODAL_TEAM_MAP = CONFIG.team_map || [];
window.taskModalOnSave = function() { loadTasks(); };
window.taskModalOnDelete = function() { loadTasks(); };
fetch('/crm/api/orgs')
  .then(r => r.json())
  .then(orgs => { window.TASK_MODAL_PROSPECT_ORGS = orgs; });
</script>
<script src="/static/task-edit-modal.js"></script>
<script src="/static/tasks/tasks.js"></script>

</body>
</html>
