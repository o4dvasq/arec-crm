<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    nav { background: #0f172a; border-bottom: 1px solid #1e293b; padding: 0 24px; display: flex; align-items: center; gap: 24px; height: 52px; }
    nav a { color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 500; }
    nav a:hover { color: #e2e8f0; }
    nav .logo { color: #e2e8f0; font-weight: 700; font-size: 16px; }
    .content { padding: 32px 24px; max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #f1f5f9; }
    .task-list { list-style: none; }
    .task-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; margin-bottom: 4px; }
    .task-item:hover { background: #1e293b; }
    .task-item.done { opacity: 0.5; }
    .task-item.done span { text-decoration: line-through; }
    input[type=checkbox] { cursor: pointer; accent-color: #2563eb; }
    span { font-size: 14px; }
    .placeholder { color: #475569; font-size: 14px; padding: 12px; }
  </style>
</head>
<body>
<nav>
  <span class="logo">AREC</span>
  <a href="/">Dashboard</a>
  <a href="/crm">CRM →</a>
</nav>
<div class="content">
  <h1>Tasks</h1>
  {% if tasks %}
  <ul class="task-list">
    {% for task in tasks %}
    <li class="task-item {% if task.done %}done{% endif %}">
      <input type="checkbox" {% if task.done %}checked{% endif %} onchange="completeTask(this, '{{ task.text | e }}')">
      <span>{{ task.text }}</span>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="placeholder">No tasks found in TASKS.md</p>
  {% endif %}
</div>
<script>
async function completeTask(el, text) {
  await fetch('/api/task/complete', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text})
  });
  el.closest('.task-item').classList.toggle('done', el.checked);
}
</script>
</body>
</html>
