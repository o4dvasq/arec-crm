name: Deploy to Azure App Service

on:
  push:
    branches:
      - azure-migration
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt

    - name: Run tests
      run: |
        python -m pytest app/tests/ -v --tb=short

    - name: Create deployment package
      run: |
        zip -r deploy.zip \
          app/ \
          scripts/ \
          startup.sh \
          requirements.txt \
          -x "*.pyc" \
          -x "**/__pycache__/*" \
          -x "**/tests/*" \
          -x "**/.env*" \
          -x "**/test_*.py"

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # Oryx builds a fresh venv from requirements.txt on every deploy
    # SCM_DO_BUILD_DURING_DEPLOYMENT=true must be set in App Settings
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'arec-crm-app'
        package: deploy.zip

    - name: Restart App Service
      run: |
        az webapp start \
          --resource-group rg-arec-crm \
          --name arec-crm-app || true
        sleep 5
        az webapp restart \
          --resource-group rg-arec-crm \
          --name arec-crm-app

    - name: Verify deployment
      run: |
        echo "Deployment complete. Verifying..."
        sleep 30
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://arec-crm-app.azurewebsites.net/crm)
        echo "HTTP status: $HTTP_STATUS"
        if [ "$HTTP_STATUS" -ge 500 ]; then
          echo "WARNING: Site returning $HTTP_STATUS — check logs"
          exit 1
        fi
        echo "Site is up at https://arec-crm-app.azurewebsites.net/crm"
