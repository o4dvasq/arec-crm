name: Deploy to Azure App Service

on:
  push:
    branches: [postgres-local]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd app
          python3 -m pytest tests/ --ignore=tests/test_tasks_api_key.py -v --tb=short

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Disable Oryx build and set startup command
        run: |
          az webapp config appsettings set \
            --name arec-crm-app \
            --resource-group rg-arec-crm \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false
          az webapp config set \
            --name arec-crm-app \
            --resource-group rg-arec-crm \
            --startup-file startup.sh

      - name: Deploy via az webapp deploy
        run: |
          zip -r deploy.zip \
            app/ \
            scripts/ \
            startup.sh \
            crm/ \
            memory/ \
            meeting-summaries/ \
            TASKS.md \
            -x "app/tests/*" \
            -x "app/__pycache__/*" \
            -x "**/__pycache__/*" \
            -x "*.pyc" \
            -x "app/.env"
          az webapp deploy \
            --name arec-crm-app \
            --resource-group rg-arec-crm \
            --src-path deploy.zip \
            --type zip \
            --clean true

      - name: Restart App Service
        run: az webapp restart --name arec-crm-app --resource-group rg-arec-crm

      - name: Verify deployment (wait for startup)
        run: |
          echo "Waiting 90s for app to start..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://arec-crm-app.azurewebsites.net/crm/ --max-time 60)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Deployment verified successfully!"
          else
            echo "WARNING: App returned HTTP $STATUS — check logs"
            az webapp log tail --name arec-crm-app --resource-group rg-arec-crm --lines 50
            exit 1
          fi
